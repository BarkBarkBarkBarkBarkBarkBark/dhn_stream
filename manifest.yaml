project:
  name: dhn_client_udp_acquisition_mvp
  repo: dhn_client
  primary_goal: >
    Build a reproducible command-line bench pipeline that generates synthetic electrophysiology
    data, sends it as pure headerless UDP to DHN-AQ, records it as MED, and verifies the MED
    output using dhn-med-py.
  non_goals_for_first_milestone:
    - Do not build or depend on a GUI.
    - Do not parse NRD first.
    - Do not put LSL in front of DHN-AQ.
    - Do not assume DHN-AQ accepts LSL.
    - Do not build a full spike sorter yet.
  key_assumption:
    dhn_aq_input_contract: >
      DHN-AQ expects pure UDP payloads with no custom application header. Channel count,
      sample rate, dtype, and channel order are inferred from DHN-AQ configuration / channel spec.

architecture:
  milestone_1_synthetic_udp_to_med:
    flow:
      - SpikeInterface synthetic recording
      - chunk traces as numpy arrays
      - cast/scale to int16
      - serialize as headerless UDP payload
      - send to DHN-AQ UDP host/port
      - DHN-AQ records stream as MED
      - dhn-med-py verifies MED output
    diagram: |
      SpikeInterface synthetic recording
          -> Python headerless UDP sender
          -> DHN-AQ receiver
          -> MED output directory
          -> dhn-med-py verification

  milestone_2_optional_lsl_sidecar:
    flow:
      - same synthetic or NRD-derived source
      - send one copy to DHN-AQ as pure UDP
      - optionally publish another copy to LSL for MNE-LSL / realtime analysis
    diagram: |
      Synthetic or NRD-derived source
          -> headerless UDP -> DHN-AQ -> MED
          -> optional LSL outlet -> MNE-LSL analysis

  milestone_3_nrd_adapter:
    flow:
      - extract NRD samples using either vendor replay, nrd2dat, or custom parser
      - normalize/reorder samples into DHN-AQ expected payload layout
      - reuse same UDP sender
      - verify resulting MED

python:
  version: ">=3.11"
  package_manager: uv
  rationale:
    - MNE-LSL currently supports Python 3.11+.
    - uv makes repeatable local virtualenv setup simple for VS Code and hospital deployment prep.

dependencies:
  runtime:
    - numpy
    - scipy
    - pydantic
    - pydantic-settings
    - typer
    - rich
    - spikeinterface
    - dhn-med-py
  optional_realtime_lsl:
    - mne
    - mne-lsl
    - pylsl
  optional_storage:
    - zarr
    - pyarrow
    - pandas
  dev:
    - pytest
    - ruff
    - mypy

system_dependencies:
  linux:
    packages:
      - python3.11
      - python3.11-venv
      - git
      - build-essential
      - tcpdump
      - iproute2
      - net-tools
    notes:
      - tcpdump is required to prove UDP packets are actually leaving/arriving before blaming DHN-AQ.
      - iproute2 is required for inspecting and assigning NIC addresses.

networking:
  default_udp:
    host: "192.168.3.50"
    port: 26090
    broadcast_host_example: "192.168.3.255"
  dhn_box_nic_example:
    interface: eno1
    ip: "192.168.3.50/24"
  validation_commands:
    inspect_interfaces: "ip addr && ip route"
    assign_test_ip: "sudo ip addr add 192.168.3.50/24 dev eno1"
    watch_udp: "sudo tcpdump -ni eno1 udp port 26090 -vv"
  packet_rules:
    first_test:
      channels: 16
      sample_rate_hz: 32000
      dtype: int16_little_endian
      frames_per_packet: 1
      layout: sample_major
    scaling_path:
      - "16 channels, 1 frame per packet"
      - "64 channels, 1 frame per packet"
      - "128 channels, 1 frame per packet"
      - "512 channels, 1 frame per packet"
      - "Only increase frames_per_packet after 1-frame packets produce valid MED."
    mtu_warning: >
      For 512 int16 channels, one sample frame is 1024 bytes. This is under normal Ethernet MTU.
      Multiple frames per packet may exceed MTU and cause fragmentation unless jumbo frames are configured.

repo_changes:
  create_directories:
    - src/darkhorse_neuralynx/udp_raw
    - src/darkhorse_neuralynx/verify
    - src/darkhorse_neuralynx/config
    - scripts
    - docs
    - tests

  create_files:
    - path: scripts/install_dev.sh
      purpose: Create reproducible Linux/VS Code dev environment.
    - path: src/darkhorse_neuralynx/udp_raw/synthetic_sender.py
      purpose: Generate SpikeInterface synthetic recording and send headerless UDP packets.
    - path: src/darkhorse_neuralynx/udp_raw/raw_sender.py
      purpose: Shared UDP serialization and pacing utilities.
    - path: src/darkhorse_neuralynx/udp_raw/probe_receiver.py
      purpose: Minimal UDP receiver for local sanity testing without DHN-AQ.
    - path: src/darkhorse_neuralynx/verify/med_verify.py
      purpose: Read DHN-AQ MED output using dhn-med-py and verify channel count, sample rate, duration, and basic signal statistics.
    - path: src/darkhorse_neuralynx/config/models.py
      purpose: Pydantic config models for sender/session configuration.
    - path: configs/synthetic_udp_16ch.yaml
      purpose: Default bench test config.
    - path: README.md
      purpose: Human-facing setup and bench validation instructions.

install_script:
  path: scripts/install_dev.sh
  chmod: "chmod +x scripts/install_dev.sh"
  content: |
    #!/usr/bin/env bash
    set -euo pipefail

    echo "[dhn-client] Installing system dependencies..."
    if command -v apt-get >/dev/null 2>&1; then
      sudo apt-get update
      sudo apt-get install -y \
        python3.11 \
        python3.11-venv \
        git \
        build-essential \
        tcpdump \
        iproute2 \
        net-tools
    else
      echo "apt-get not found. Install Python 3.11, git, build-essential, tcpdump, and iproute2 manually."
    fi

    echo "[dhn-client] Installing uv if missing..."
    if ! command -v uv >/dev/null 2>&1; then
      curl -LsSf https://astral.sh/uv/install.sh | sh
      export PATH="$HOME/.local/bin:$PATH"
    fi

    echo "[dhn-client] Creating Python 3.11 virtual environment..."
    uv venv --python 3.11 .venv

    echo "[dhn-client] Activating venv..."
    source .venv/bin/activate

    echo "[dhn-client] Installing package and dependencies..."
    uv pip install --upgrade pip
    uv pip install -e .
    uv pip install \
      numpy \
      scipy \
      pydantic \
      pydantic-settings \
      typer \
      rich \
      spikeinterface \
      dhn-med-py \
      mne \
      mne-lsl \
      pylsl \
      zarr \
      pandas \
      pyarrow \
      pytest \
      ruff \
      mypy

    echo "[dhn-client] Verifying imports..."
    python - <<'PY'
    import numpy
    import spikeinterface
    import mne_lsl
    print("OK: numpy", numpy.__version__)
    print("OK: spikeinterface imported")
    print("OK: mne_lsl imported")
    PY

    echo "[dhn-client] Done."
    echo "Activate with: source .venv/bin/activate"

pyproject_updates:
  project_python_requires: ">=3.11"
  add_scripts:
    dhn-si-udp: "darkhorse_neuralynx.udp_raw.synthetic_sender:app"
    dhn-udp-probe: "darkhorse_neuralynx.udp_raw.probe_receiver:app"
    dhn-verify-med: "darkhorse_neuralynx.verify.med_verify:app"

config_example:
  path: configs/synthetic_udp_16ch.yaml
  content: |
    session:
      name: synthetic_udp_16ch_test
      description: SpikeInterface synthetic recording sent as headerless UDP into DHN-AQ.

    udp:
      host: "192.168.3.50"
      port: 26090
      broadcast: false
      send_buffer_bytes: 8388608

    signal:
      source: spikeinterface_generate_ground_truth_recording
      channels: 16
      units: 8
      sample_rate_hz: 32000
      duration_seconds: 60
      seed: 42

    payload:
      dtype: int16
      endianness: little
      layout: sample_major
      frames_per_packet: 1
      target_peak_int16: 8000
      headerless: true

    pacing:
      realtime: true
      speed: 1.0

    dhn_aq:
      expected_receive_mode: pure_udp_no_header
      expected_channel_count: 16
      expected_sample_rate_hz: 32000
      notes:
        - Configure DHN-AQ channel spec to exactly match channel count and sample rate.
        - Start tcpdump before starting DHN-AQ recording.
        - Start with 16 channels before attempting 512 channels.

implementation_details:
  raw_sender:
    requirements:
      - Accept numpy traces shaped [frames, channels].
      - Convert to contiguous little-endian int16.
      - Serialize with tobytes(order="C").
      - Send via socket.sendto(payload, [host, port]).
      - Pace packets using time.perf_counter.
      - Track packets_sent, bytes_sent, underruns, and effective_sample_rate.
    sample_major_layout: >
      Payload order must be frame0_ch0, frame0_ch1, frame0_ch2... frame1_ch0, frame1_ch1...
    important_warning: >
      If MED readback shows scrambled channels, test channel_major layout as an alternate mode.

  synthetic_sender:
    cli_args:
      - "--host"
      - "--port"
      - "--channels"
      - "--sample-rate"
      - "--duration"
      - "--frames-per-packet"
      - "--seed"
      - "--target-peak"
      - "--config"
      - "--dry-run"
    behavior:
      - Load YAML config if provided.
      - Generate SpikeInterface synthetic recording.
      - Pull traces in chunks.
      - Scale traces safely to int16.
      - Send headerless UDP.
      - Print live status once per second.
      - Exit cleanly after duration ends.

  probe_receiver:
    purpose: >
      Local sanity receiver to prove sender payload shape and packet rate before involving DHN-AQ.
    cli_example: "dhn-udp-probe --host 0.0.0.0 --port 26090 --expected-bytes 32"
    behavior:
      - Bind UDP socket.
      - Count packets and bytes.
      - Print packet rate and byte rate.
      - Optionally decode first few int16 values.

  med_verify:
    purpose: >
      Verify DHN-AQ output after recording.
    cli_args:
      - "--med-path"
      - "--password"
      - "--expect-channels"
      - "--expect-sample-rate"
      - "--read-seconds"
      - "--report-json"
    checks:
      - MED path exists.
      - dhn-med-py can open the session.
      - Expected channel count matches.
      - Expected sample rate matches if metadata exposes it.
      - At least N seconds can be read.
      - Signal is nonzero.
      - Per-channel mean, std, min, max are plausible.
    output:
      - Print rich console summary.
      - Write machine-readable JSON report.

acceptance_tests:
  local_probe_test:
    description: Prove UDP sender emits packets without DHN-AQ.
    terminal_1: "dhn-udp-probe --host 0.0.0.0 --port 26090"
    terminal_2: "dhn-si-udp --host 127.0.0.1 --port 26090 --channels 16 --sample-rate 32000 --duration 10 --frames-per-packet 1"
    pass_criteria:
      - Probe receives packets.
      - Probe packet rate is approximately sample_rate / frames_per_packet.
      - No sender crash.

  dhn_aq_synthetic_16ch_test:
    description: Prove DHN-AQ records synthetic UDP into MED.
    steps:
      - Configure DHN-AQ for 16 channels at 32000 Hz.
      - Configure DHN-AQ receive IP/port to match sender.
      - Start tcpdump on DHN NIC.
      - Start DHN-AQ recording.
      - Run synthetic UDP sender for 60 seconds.
      - Stop DHN-AQ recording cleanly.
      - Run MED verification.
    commands:
      tcpdump: "sudo tcpdump -ni eno1 udp port 26090 -vv"
      sender: "dhn-si-udp --config configs/synthetic_udp_16ch.yaml"
      verifier: "dhn-verify-med --med-path /mnt/dhn/recordings/<SESSION>.medd --expect-channels 16 --expect-sample-rate 32000 --read-seconds 5 --report-json runs/synthetic_16ch_report.json"
    pass_criteria:
      - tcpdump sees UDP packets.
      - DHN-AQ creates MED output.
      - dhn-med-py opens MED output.
      - MED contains expected channel count.
      - Readback data is nonzero and plausible.

  scale_test:
    description: Increase channel count only after 16ch works.
    matrix:
      channels: [16, 64, 128, 512]
      frames_per_packet: [1]
    pass_criteria:
      - No packet loss symptoms visible in MED readback.
      - DHN-AQ remains responsive.
      - CPU and network usage are acceptable.

readme_generation:
  instruction_to_agent: >
    Generate a README.md that is practical, short, and bench-focused. It should help a new developer
    or lab operator reproduce synthetic UDP acquisition into DHN-AQ and verify MED output.
  required_sections:
    - title: "DHN Client: Synthetic UDP Acquisition Bench"
      content:
        - One-paragraph explanation of the project.
        - State that the first milestone is synthetic SpikeInterface data to DHN-AQ via pure headerless UDP.
    - title: "System Architecture"
      content:
        - Include ASCII diagram of SpikeInterface -> UDP -> DHN-AQ -> MED -> dhn-med-py.
        - Clearly state that LSL is optional and not used in front of DHN-AQ.
    - title: "Requirements"
      content:
        - Linux workstation.
        - Python 3.11.
        - uv.
        - DHN-AQ installed/configured separately.
        - tcpdump.
    - title: "Install"
      content:
        - Show chmod and script invocation.
        - Show venv activation.
    - title: "Configure DHN-AQ"
      content:
        - Explain matching channel count, sample rate, UDP port, receive interface, and output directory.
        - Warn that DHN-AQ config must match sender config exactly.
    - title: "Run Local UDP Probe"
      content:
        - Show terminal 1 receiver command.
        - Show terminal 2 sender command.
    - title: "Run DHN-AQ Recording Test"
      content:
        - Step-by-step operator instructions.
        - Include tcpdump command.
        - Include sender command.
    - title: "Verify MED Output"
      content:
        - Show dhn-verify-med command.
        - Explain expected pass/fail output.
    - title: "Troubleshooting"
      content:
        - No packets in tcpdump means network/sender issue, not DHN-AQ.
        - Packets visible but no MED means DHN-AQ config issue.
        - MED exists but data scrambled means dtype/layout/channel spec mismatch.
        - Works at 16 channels but fails at 512 means packet rate/CPU/NIC tuning issue.
    - title: "Next Milestones"
      content:
        - Add optional LSL mirror.
        - Add NRD-derived source adapter.
        - Add automated run reports.
        - Add hospital deployment notes.

vscode_agent_rules:
  coding_style:
    - Keep modules small.
    - Prefer explicit CLI commands over hidden behavior.
    - Use type hints.
    - Use Pydantic for config validation.
    - Use Rich for readable terminal output.
    - Avoid global mutable state.
    - Do not require DHN-AQ for unit tests.
  safety_rules:
    - Never assume channel count or sample rate.
    - Always print payload byte size before sending.
    - Always warn if UDP payload size exceeds 1400 bytes unless user explicitly allows fragmentation.
    - Always provide a dry-run mode.
    - Never silently change dtype/layout.
  testing_rules:
    - Unit-test int16 scaling.
    - Unit-test sample_major serialization.
    - Unit-test channel_major serialization if implemented.
    - Unit-test config loading.
    - Integration-test sender against probe receiver.
  done_definition:
    - install script runs cleanly on Linux.
    - local UDP probe test passes.
    - synthetic sender can run from CLI.
    - README contains exact bench commands.
    - MED verifier command exists, even if final DHN-AQ validation requires the real DHN environment.

future_nrd_adapter:
  status: defer_until_synthetic_udp_to_med_works
  possible_sources:
    - vendor_replay: Neuralynx/Cheetah/Pegasus replay if available.
    - nrd2dat: Extract NRD samples to flat binary, then reuse UDP sender.
    - custom_parser: Only if existing tools fail or exact control is required.
  required_before_implementation:
    - Confirm DHN-AQ dtype.
    - Confirm DHN-AQ channel order.
    - Confirm sample-major vs channel-major layout.
    - Confirm tolerated packet size.
    - Confirm output MED readback matches synthetic source.